# Rights are defined per role and shared by all tokens in that role.
# read:  access library data (GET endpoints)
# write: modify the library (POST/PUT/DELETE endpoints)
# debug: access pprof and metrics endpoints

- role: guest
  read: true
  write: false
  debug: false
  token:
  - name: guest_token_name
    value: secure_guest_token

- role: user
  read: true
  write: true
  debug: false
  token:
  - name: user_token_name
    value: secure_user_token

- role: admin
  read: true
  write: true
  debug: true
  token:
  - name: admin_token_name
    value: secure_admin_token
